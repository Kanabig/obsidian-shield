<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사용자 로그</title>

    <link rel="stylesheet"
        href="{{ url_for('user_log.static', filename='css/logger.css') }}">
</head>
<body>

    <div class="container">

        <header class="page_header">

            <h2>사용자 로그</h2>

            <div class="button_group">
                <a class="btn_download" href="{{ url_for('user_log.export_user_data') }}">
                    엑셀 다운로드
                </a>
            </div>
        </header>

        <article class="table_wrap">
            <table class="log_table">
                <thead>
                    <tr>
                        <th>No.</th>
                        <th>이벤트 ID</th>
                        <th>사용자 ID</th>
                        <th>읽은 시간</th>
                    </tr>
                </thead>

                <tbody>

                    {% for log in logs %}

                    <tr>
                        <td>{{ loop.index }}</td>
                        <td>{{ log.EVENT_LOG_ID }}</td>
                        <td>{{ log.VIEWER_ID }}</td>
                        <td>{{ log.READ_DATE }}</td>
                    </tr>

                    {% else %}

                    <tr>
                        <td colspan="4" class="empty">
                            등록된 사용자 로그가 없습니다.
                        </td>
                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </article>

    </div>
    
</body>
</html>
