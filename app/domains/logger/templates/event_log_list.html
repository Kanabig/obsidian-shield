<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이벤트 로그</title>

    <link rel="stylesheet"
        href="{{ url_for('event_log.static', filename='css/logger.css') }}">

</head>
<body>

    <div class="container">

        <header class="page_header">
            <h2>이벤트 로그</h2>

            <div class="button_group">
                <button id="btn_selected" class="btn_read">
                    선택 읽음 처리
                </button>

                <a class="btn_download"
                href="{{ url_for('event_log.export_event_data') }}">
                    엑셀 다운로드
                </a>
            </div>
        </header>

        <article class="table_wrap">

            <table class="log_table">

                <thead>
                    <tr>
                        <th>
                            <input type="checkbox" id="check_all">
                        </th>

                        <th>No.</th>
                        <th>이벤트ID</th>
                        <th>발생시간</th>
                        <th>위도</th>
                        <th>경도</th>
                        <th>대상ID</th>
                        <th>상태</th>
                    </tr>
                </thead>

                <tbody>

                    {% for event in events %}

                    <tr>

                        <td>
                        <input class="log_check" type="checkbox"
                        value="{{ event.ID }}" {% if event.IS_READ %}disabled{% endif %}>
                        </td>

                        <td>{{ loop.index }}</td>
                        <td>{{ event.ID }}</td>
                        <td>{{ event.REG_DATE }}</td>
                        <td>{{ event.latitude }}</td>
                        <td>{{ event.longitude }}</td>
                        <td>{{ event.TARGET_ID }}</td>

                        <td>
                        {% if event.IS_READ %}

                        <span class="checked">읽음</span>

                        {% else %}

                        <span class="unchecked">읽지않음</span>

                        {% endif %}

                        </td>
                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </article>

    </div>
    
    <script src="{{ url_for('event_log.static', filename='js/logger.js') }}"></script>

</body>
</html>
