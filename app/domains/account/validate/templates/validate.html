<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 유효성 검사 테스트</title>

    <style>
        body{
            width:600px;
            margin:50px auto;
            font-family:Arial;
        }

        table{
            width:100%;
        }

        td{
            padding:8px;
        }

        input{
            width:100%;
            padding:8px;
        }

        .phone{
            display:flex;
            gap:10px;
        }

        .phone input{
            flex:1;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:20px;
        }

        #result{
            margin-top:20px;
            font-weight:bold;
        }
    </style>

</head>
<body>

<h2>회원가입 유효성 검사</h2>

<form action="/signup" method="post">

    <table>

        <tr>
            <td>아이디</td>
            <td>
                <input type="text" name="id">
            </td>
        </tr>

        <tr>
            <td>비밀번호</td>
            <td>
                <input type="password" name="pw">
            </td>
        </tr>

        <tr>
            <td>이메일</td>
            <td>
                <input type="text" name="email">
            </td>
        </tr>

        <tr>
            <td>전화번호</td>
            <td>

                <div class="phone">
                    <input type="text" name="p1" maxlength="3">
                    <input type="text" name="p2" maxlength="4">
                    <input type="text" name="p3" maxlength="4">
                </div>

            </td>
        </tr>

    </table>

    <button type="submit">
        회원가입 테스트
    </button>

</form>

    {% if message %}
<div id="result">
    {{ message }}
</div>
    {% endif %}

</body>
</html>
