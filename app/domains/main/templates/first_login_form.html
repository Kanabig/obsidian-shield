<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Shield - 최초 비밀번호 설정</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('main.static', filename='css/first_login_form.css') }}"
   
</head>
<body>

    <header class="header-bar">
            <h1>OBSIDIAN SHIELD</h1>
                <p>AI 기반 실시간 추적 관제 시스템</p>
            </div>
        </div>
    </header>

    <main class="main-container">

        <section class="setup-card">
            <div class="top-icon">
                <i class="fa-solid fa-lock"></i>
            </div>

            <div class="title-section">
                <h2>최초 비밀번호 설정</h2>
                <p>보안을 위해 최초 로그인 시 비밀번호를 변경해야 합니다.</p>
            </div>

            <form class="setup-form">
                <div class="input-group">
                    <label><i class="fa-solid fa-lock"></i> 현재 임시 비밀번호</label>
                    <div class="input-wrapper">
                        <input type="password" placeholder="임시 비밀번호를 입력하세요">
                        <button type="button" class="toggle-password"><i class="fa-regular fa-eye"></i></button>
                    </div>
                </div>

                <div class="input-group">
                    <label><i class="fa-solid fa-lock"></i> 새 비밀번호</label>
                    <div class="input-wrapper">
                        <input type="password" placeholder="새 비밀번호를 입력하세요">
                        <button type="button" class="toggle-password"><i class="fa-regular fa-eye"></i></button>
                    </div>
                </div>

                <div class="input-group">
                    <label><i class="fa-solid fa-lock"></i> 새 비밀번호 확인</label>
                    <div class="input-wrapper">
                        <input type="password" placeholder="새 비밀번호를 다시 입력하세요">
                        <button type="button" class="toggle-password"><i class="fa-regular fa-eye"></i></button>
                    </div>
                </div>

                <div class="info-box">
                    <h3><i class="fa-solid fa-circle-info"></i> 비밀번호 설정 안내</h3>
                    <ul>
                        <li>8자 이상 16자 이하로 입력하세요.</li>
                        <li>영문, 숫자, 특수문자 중 2가지 이상을 포함하세요.</li>
                        <li>아이디와 동일한 비밀번호는 사용할 수 없습니다.</li>
                    </ul>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fa-solid fa-lock"></i> 비밀번호 변경
                </button>
            </form>
        </section>
    </main>

</body>
</html>
